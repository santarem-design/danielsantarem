name: Update Scopus Stats

on:
  schedule:
    # Corre todas as segundas-feiras às 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: {} # permite correr manualmente a partir do separador "Actions" no GitHub

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Scopus data
        env:
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
          SCOPUS_AUTHOR_ID: '58106562500'
        run: |
          curl -s "https://api.elsevier.com/content/author?author_id=${SCOPUS_AUTHOR_ID}&apiKey=${SCOPUS_API_KEY}&httpAccept=application/json" \
            -o raw-response.json

          python3 - <<'EOF'
          import json
          from datetime import datetime, timezone

          with open("raw-response.json") as f:
              data = json.load(f)

          core = data["author-retrieval-response"][0]["coredata"]

          stats = {
              "citations": int(core.get("citation-count", 0)),
              "documents": int(core.get("document-count", 0)),
              "h_index": None,  # ver nota abaixo
              "updated_at": datetime.now(timezone.utc).isoformat()
          }

          # tenta obter o h-index, se vier presente noutro campo
          h_index = data["author-retrieval-response"][0].get("h-index")
          if h_index is not None:
              stats["h_index"] = int(h_index)

          with open("scopus-stats.json", "w") as f:
              json.dump(stats, f, indent=2)

          print(stats)
          EOF

          rm raw-response.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scopus-stats.json
          git diff --quiet --cached || git commit -m "Update Scopus stats"
          git push
